<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Menu - Cantine Scolaire</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet"></head>
<body class="bg-light">
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div th:insert="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 fw-bold"><i class="bi bi-calendar-plus text-primary me-2"></i>
                    <span th:text="${menu.id != null} ? 'Modifier Menu' : 'Nouveau Menu'"></span>
                </h1>
                <a href="/menus" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Retour</a>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${menu.id != null} ? @{/menus/{id}/edit(id=${menu.id})} : @{/menus/new}"
                          th:object="${menu}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Date du Menu *</label>
                                <input type="date" th:field="*{dateMenu}" class="form-control" th:classappend="${#fields.hasErrors('dateMenu')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{dateMenu}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Titre *</label>
                                <input type="text" th:field="*{titre}" class="form-control" placeholder="Ex: Menu du Lundi" th:classappend="${#fields.hasErrors('titre')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{titre}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Description du menu..."></textarea>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check form-switch mt-2">
                                    <input type="checkbox" th:field="*{actif}" class="form-check-input" role="switch">
                                    <label class="form-check-label fw-semibold">Menu actif</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Plats du Menu</label>
                                <div class="row g-2">
                                    <div th:each="plat : ${plats}" class="col-md-4 col-6">
                                        <div class="form-check border rounded p-3">
                                            <input class="form-check-input" type="checkbox" name="platIds"
                                                   th:value="${plat.id}"
                                                   th:checked="${menu.platIds != null and menu.platIds.contains(plat.id)}"
                                                   th:id="'plat_' + ${plat.id}">
                                            <label class="form-check-label" th:for="'plat_' + ${plat.id}">
                                                <div th:text="${plat.nom}" class="fw-semibold small"></div>
                                                <small class="text-success" th:text="${#numbers.formatDecimal(plat.prix,1,'COMMA',2,'POINT')} + ' MAD'"></small>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 d-flex gap-2 justify-content-end mt-2">
                                <a href="/menus" class="btn btn-outline-secondary">Annuler</a>
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-floppy me-1"></i>Enregistrer
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
