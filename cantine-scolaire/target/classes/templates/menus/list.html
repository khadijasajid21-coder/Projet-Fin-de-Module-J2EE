<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Menus - Cantine Scolaire</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<style>
.menu-card { transition: transform .2s, box-shadow .2s; cursor: pointer; }
.menu-card:hover { transform: translateY(-4px); box-shadow: 0 .75rem 1.5rem rgba(0,0,0,.12) !important; }
.plat-img { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; border: 2px solid #e9ecef; }
.plat-img-placeholder { width: 44px; height: 44px; background: #f0f0f0; border-radius: 8px; display:flex; align-items:center; justify-content:center; }
.menu-banner { height: 90px; background: linear-gradient(135deg, #0d6efd, #6610f2); border-radius: 12px 12px 0 0; display:flex; align-items:center; padding: 16px; }
.badge-statut { font-size: .7rem; padding: 5px 10px; border-radius: 20px; }
</style>
</head>
<body class="bg-light">
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div th:insert="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">
<div class="container-fluid py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold"><i class="bi bi-calendar-week text-primary me-2"></i>Gestion des Menus</h1>
        <a href="/menus/new" class="btn btn-primary px-4"><i class="bi bi-plus-lg me-1"></i>Nouveau Menu</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtre -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-9">
                    <input type="text" name="q" th:value="${q}" class="form-control" placeholder="🔍  Rechercher un menu...">
                </div>
                <div class="col-md-2"><button class="btn btn-primary w-100">Chercher</button></div>
                <div class="col-md-1"><a href="/menus" class="btn btn-outline-secondary w-100"><i class="bi bi-x-lg"></i></a></div>
            </form>
        </div>
    </div>

    <!-- Cards Menus -->
    <div class="row g-4" th:if="${not #lists.isEmpty(menus.content)}">
        <div class="col-xl-4 col-md-6" th:each="menu : ${menus.content}">
            <div class="card border-0 shadow-sm menu-card h-100" style="border-radius:12px;overflow:hidden">

                <!-- Banner -->
                <div class="menu-banner" th:style="${menu.actif} ? 'background:linear-gradient(135deg,#0d6efd,#6610f2)' : 'background:linear-gradient(135deg,#6c757d,#495057)'">
                    <div class="flex-grow-1">
                        <div class="text-white fw-bold fs-5" th:text="${menu.titre}">Menu</div>
                        <div class="text-white-50 small">
                            <i class="bi bi-calendar3 me-1"></i>
                            <span th:text="${#temporals.format(menu.dateMenu,'EEEE dd MMMM yyyy')}"></span>
                        </div>
                    </div>
                    <span th:if="${menu.actif}" class="badge bg-success badge-statut"><i class="bi bi-check-circle me-1"></i>Actif</span>
                    <span th:unless="${menu.actif}" class="badge bg-secondary badge-statut">Inactif</span>
                </div>

                <div class="card-body p-3">
                    <!-- Description -->
                    <p class="text-muted small mb-3" th:text="${menu.description ?: 'Aucune description'}"></p>

                    <!-- Plats avec images -->
                    <div class="fw-semibold small text-uppercase text-muted mb-2">
                        <i class="bi bi-egg-fried me-1"></i>
                        <span th:text="${menu.menuPlats.size()} + ' plat(s)'"></span>
                    </div>
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <div th:each="mp : ${menu.menuPlats}" class="d-flex align-items-center gap-2 bg-light rounded px-2 py-1" style="max-width:100%">
                            <img th:if="${mp.plat.image != null}"
                                 th:src="${#strings.startsWith(mp.plat.image,'http') ? mp.plat.image : '/uploads/' + mp.plat.image}"
                                 class="plat-img" th:alt="${mp.plat.nom}">
                            <div th:unless="${mp.plat.image != null}" class="plat-img-placeholder">
                                <i class="bi bi-egg-fried text-secondary"></i>
                            </div>
                            <div>
                                <div class="small fw-semibold" style="line-height:1.1" th:text="${mp.plat.nom}"></div>
                                <div class="text-success" style="font-size:.75rem;font-weight:700" th:text="${mp.plat.prix} + ' MAD'"></div>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(menu.menuPlats)}" class="text-muted small fst-italic">Aucun plat associé</div>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-2 mt-auto">
                        <a th:href="@{/menus/{id}/edit(id=${menu.id})}" class="btn btn-sm btn-outline-primary flex-grow-1">
                            <i class="bi bi-pencil me-1"></i>Modifier
                        </a>
                        <form th:action="@{/menus/{id}/delete(id=${menu.id})}" method="post" class="flex-grow-1"
                              onsubmit="return confirm('Supprimer ce menu ?')">
                            <button class="btn btn-sm btn-outline-danger w-100">
                                <i class="bi bi-trash me-1"></i>Supprimer
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Vide -->
    <div th:if="${#lists.isEmpty(menus.content)}" class="text-center py-5">
        <i class="bi bi-calendar-x display-4 text-muted"></i>
        <p class="text-muted mt-3">Aucun menu trouvé</p>
        <a href="/menus/new" class="btn btn-primary mt-2">Créer un menu</a>
    </div>

    <!-- Pagination -->
    <nav th:if="${menus.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${menus.first} ? 'disabled'">
                <a class="page-link" th:href="@{/menus(page=${menus.number - 1}, q=${q})}">‹</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, menus.totalPages - 1)}"
                th:classappend="${i == menus.number} ? 'active'">
                <a class="page-link" th:href="@{/menus(page=${i}, q=${q})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${menus.last} ? 'disabled'">
                <a class="page-link" th:href="@{/menus(page=${menus.number + 1}, q=${q})}">›</a>
            </li>
        </ul>
    </nav>

</div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
