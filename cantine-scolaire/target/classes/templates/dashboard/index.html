<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - Cantine Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div th:insert="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold text-dark mb-0"><i class="bi bi-speedometer2 text-primary me-2"></i>Tableau de bord</h1>
            <span class="text-muted small" th:text="${#temporals.format(#temporals.createNow(), 'EEEE dd MMMM yyyy')}"></span>
        </div>

        <!-- KPI Cards -->
        <div class="row g-4 mb-4">
            <div class="col-xl-2 col-md-4 col-6">
                <div class="card border-0 shadow-sm h-100 kpi-card">
                    <div class="card-body text-center py-4">
                        <div class="kpi-icon bg-primary-subtle text-primary mb-3"><i class="bi bi-bag-check fs-4"></i></div>
                        <div class="fs-2 fw-bold text-primary" th:text="${dashboard.totalCommandes}">0</div>
                        <div class="text-muted small">Total Commandes</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-6">
                <div class="card border-0 shadow-sm h-100 kpi-card">
                    <div class="card-body text-center py-4">
                        <div class="kpi-icon bg-warning-subtle text-warning mb-3"><i class="bi bi-clock-history fs-4"></i></div>
                        <div class="fs-2 fw-bold text-warning" th:text="${dashboard.commandesAujourdhui}">0</div>
                        <div class="text-muted small">Commandes Aujourd'hui</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-6">
                <div class="card border-0 shadow-sm h-100 kpi-card">
                    <div class="card-body text-center py-4">
                        <div class="kpi-icon bg-success-subtle text-success mb-3"><i class="bi bi-mortarboard fs-4"></i></div>
                        <div class="fs-2 fw-bold text-success" th:text="${dashboard.totalEtudiants}">0</div>
                        <div class="text-muted small">Étudiants Inscrits</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-6">
                <div class="card border-0 shadow-sm h-100 kpi-card">
                    <div class="card-body text-center py-4">
                        <div class="kpi-icon bg-info-subtle text-info mb-3"><i class="bi bi-calendar-week fs-4"></i></div>
                        <div class="fs-2 fw-bold text-info" th:text="${dashboard.totalMenus}">0</div>
                        <div class="text-muted small">Menus Créés</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-md-8">
                <div class="card border-0 shadow-sm h-100 kpi-card border-start border-success border-4">
                    <div class="card-body d-flex align-items-center gap-3 py-4">
                        <div class="kpi-icon bg-success text-white mb-0"><i class="bi bi-cash-coin fs-4"></i></div>
                        <div>
                            <div class="fs-3 fw-bold text-success" th:text="${#numbers.formatDecimal(dashboard.montantTotal,1,'COMMA',2,'POINT')} + ' MAD'">0.00 MAD</div>
                            <div class="text-muted small">Chiffre d'affaires total</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-4 mb-4">
            <div class="col-xl-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h6 class="fw-bold"><i class="bi bi-graph-up text-primary me-2"></i>Commandes - 30 derniers jours</h6>
                    </div>
                    <div class="card-body"><canvas id="chartJour" height="100"></canvas></div>
                </div>
            </div>
            <div class="col-xl-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h6 class="fw-bold"><i class="bi bi-pie-chart text-warning me-2"></i>Répartition par statut</h6>
                    </div>
                    <div class="card-body"><canvas id="chartStatut" height="200"></canvas></div>
                </div>
            </div>
        </div>

        <!-- Charts Row 2 -->
        <div class="row g-4 mb-4">
            <div class="col-xl-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h6 class="fw-bold"><i class="bi bi-bar-chart text-success me-2"></i>Commandes par mois (année en cours)</h6>
                    </div>
                    <div class="card-body"><canvas id="chartMois" height="120"></canvas></div>
                </div>
            </div>
            <div class="col-xl-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h6 class="fw-bold"><i class="bi bi-trophy text-warning me-2"></i>Top 10 plats commandés</h6>
                    </div>
                    <div class="card-body"><canvas id="chartTopPlats" height="120"></canvas></div>
                </div>
            </div>
        </div>

        <!-- CA Journalier -->
        <div class="row g-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h6 class="fw-bold"><i class="bi bi-currency-dollar text-success me-2"></i>Chiffre d'affaires journalier (30 jours)</h6>
                    </div>
                    <div class="card-body"><canvas id="chartCA" height="80"></canvas></div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
const joursLabels = /*[[${dashboard.commandesParJourLabels}]]*/ [];
const joursData = /*[[${dashboard.commandesParJourData}]]*/ [];
const moisLabels = /*[[${dashboard.commandesParMoisLabels}]]*/ [];
const moisData = /*[[${dashboard.commandesParMoisData}]]*/ [];
const statutLabels = Object.keys(/*[[${dashboard.statutsRepartition}]]*/ {});
const statutData = Object.values(/*[[${dashboard.statutsRepartition}]]*/ {});
const topNoms = /*[[${dashboard.topPlatsNoms}]]*/ [];
const topQtes = /*[[${dashboard.topPlatsQuantites}]]*/ [];
const caLabels = /*[[${dashboard.caJournalierLabels}]]*/ [];
const caData = /*[[${dashboard.caJournalierData}]]*/ [];

const defaults = { responsive: true, plugins: { legend: { display: false } } };

new Chart('chartJour', {
    type: 'line',
    data: { labels: joursLabels, datasets: [{ data: joursData, borderColor: '#0d6efd', backgroundColor: 'rgba(13,110,253,0.1)', fill: true, tension: 0.4 }] },
    options: { ...defaults, plugins: { legend: { display: false } } }
});

new Chart('chartStatut', {
    type: 'doughnut',
    data: { labels: statutLabels, datasets: [{ data: statutData, backgroundColor: ['#ffc107','#0dcaf0','#fd7e14','#198754','#dc3545'] }] },
    options: { responsive: true }
});

new Chart('chartMois', {
    type: 'bar',
    data: { labels: moisLabels, datasets: [{ data: moisData, backgroundColor: 'rgba(25,135,84,0.7)', borderColor: '#198754', borderWidth: 2 }] },
    options: defaults
});

new Chart('chartTopPlats', {
    type: 'bar',
    data: { labels: topNoms, datasets: [{ data: topQtes, backgroundColor: 'rgba(255,193,7,0.7)', borderColor: '#ffc107', borderWidth: 2 }] },
    options: { ...defaults, indexAxis: 'y' }
});

new Chart('chartCA', {
    type: 'line',
    data: { labels: caLabels, datasets: [{ data: caData, borderColor: '#198754', backgroundColor: 'rgba(25,135,84,0.1)', fill: true, tension: 0.4 }] },
    options: { ...defaults }
});
</script>
</body>
</html>
