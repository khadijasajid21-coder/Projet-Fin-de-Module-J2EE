# ============================================================
# CONFIGURATION - CANTINE SCOLAIRE
# ============================================================

# Application
spring.application.name=cantine-scolaire
server.port=8080

# DataSource MySQL
# Modifier username/password selon votre installation MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/cantine_scolaire?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# "none" = on se fie à schema.sql pour créer les tables
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# NE PAS spécifier le dialect — Hibernate 6 le détecte automatiquement

# SQL Init — exécuté à chaque démarrage
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=cantine-scolaire-super-secret-key-must-be-256-bits-long-for-hs256-algorithm
app.jwt.expiration=86400000

# Upload directory
app.upload.dir=uploads/images

# Pagination
app.pagination.size=10

# Logging
logging.level.com.example.cantine=INFO
logging.level.org.springframework.security=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# SpringDoc Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
