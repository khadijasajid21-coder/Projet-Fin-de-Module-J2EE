<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Commandes - Cantine Scolaire</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet"></head>
<body class="bg-light">
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div th:insert="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold"><i class="bi bi-bag-check text-primary me-2"></i>Gestion des Commandes</h1>
        <span class="badge bg-primary fs-6" th:text="${commandes.totalElements} + ' commande(s)'"></span>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <!-- Filtres -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form method="get" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Statut</label>
                    <select name="statut" class="form-select">
                        <option value="">Tous les statuts</option>
                        <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}" th:selected="${s.name() == statutSelectionne}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">Date début</label>
                    <input type="date" name="dateDebut" th:value="${dateDebut}" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">Date fin</label>
                    <input type="date" name="dateFin" th:value="${dateFin}" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Recherche étudiant</label>
                    <input type="text" name="q" th:value="${q}" class="form-control" placeholder="Nom ou matricule...">
                </div>
                <div class="col-md-2 d-flex align-items-end gap-2">
                    <button class="btn btn-primary flex-fill"><i class="bi bi-funnel me-1"></i>Filtrer</button>
                    <a href="/commandes" class="btn btn-outline-secondary"><i class="bi bi-x"></i></a>
                </div>
            </form>
        </div>
    </div>
    <!-- Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr><th>#</th><th>Étudiant</th><th>Date</th><th>Montant</th><th>Qté</th><th>Statut</th><th class="text-end">Actions</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${commandes.content}">
                            <td class="text-muted small">#<span th:text="${c.id}"></span></td>
                            <td>
                                <div class="fw-semibold" th:text="${c.etudiant.utilisateur.nomComplet}"></div>
                                <small class="text-muted" th:text="${c.etudiant.matricule}"></small>
                            </td>
                            <td><small th:text="${#temporals.format(c.dateCommande,'dd/MM/yyyy HH:mm')}"></small></td>
                            <td class="fw-bold text-success" th:text="${#numbers.formatDecimal(c.montantTotal,1,'COMMA',2,'POINT')} + ' MAD'"></td>
                            <td><span class="badge bg-info" th:text="${c.quantiteTotale}"></span></td>
                            <td>
                                <span class="badge statut-badge"
                                      th:classappend="${c.statut.name() == 'EN_ATTENTE'} ? 'bg-warning text-dark' :
                                                     (${c.statut.name() == 'VALIDEE'} ? 'bg-info' :
                                                     (${c.statut.name() == 'PREPAREE'} ? 'bg-warning' :
                                                     (${c.statut.name() == 'SERVIE'} ? 'bg-success' : 'bg-danger')))"
                                      th:text="${c.statut}"></span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/commandes/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye me-1"></i>Détails
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${commandes.empty}">
                            <td colspan="7" class="text-center text-muted py-5"><i class="bi bi-bag-x fs-2 d-block mb-2"></i>Aucune commande trouvée</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center">
            <small class="text-muted">Page <span th:text="${commandes.number + 1}"></span> sur <span th:text="${commandes.totalPages}"></span></small>
            <nav th:if="${commandes.totalPages > 1}">
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${commandes.first} ? 'disabled'"><a class="page-link" th:href="@{/commandes(page=${commandes.number - 1},statut=${statutSelectionne},q=${q})}">«</a></li>
                    <li th:each="i : ${#numbers.sequence(0, commandes.totalPages - 1)}" class="page-item" th:classappend="${i == commandes.number} ? 'active'"><a class="page-link" th:href="@{/commandes(page=${i},statut=${statutSelectionne},q=${q})}" th:text="${i + 1}"></a></li>
                    <li class="page-item" th:classappend="${commandes.last} ? 'disabled'"><a class="page-link" th:href="@{/commandes(page=${commandes.number + 1},statut=${statutSelectionne},q=${q})}">»</a></li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
