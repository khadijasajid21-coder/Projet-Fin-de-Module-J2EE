<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Cantine Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .login-card { border-radius: 20px; border: none; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .login-header { background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 20px 20px 0 0; }
        .form-control { background: #f8f9fa; border: 2px solid transparent; border-radius: 10px; }
        .form-control:focus { border-color: #f59e0b; box-shadow: 0 0 0 0.2rem rgba(245,158,11,0.25); }
        .btn-login { background: linear-gradient(135deg, #f59e0b, #ef4444); border: none; border-radius: 10px; font-weight: 600; letter-spacing: 0.5px; }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(245,158,11,0.5); }
        .input-group-text { background: #fff; border: 2px solid transparent; }
        .credentials-info { background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="login-card card">
                <div class="login-header text-white text-center py-5">
                    <i class="bi bi-cup-hot-fill" style="font-size:3rem"></i>
                    <h2 class="mt-2 fw-bold">Cantine Scolaire</h2>
                    <p class="mb-0 opacity-75">Gestion de cantine intelligente</p>
                </div>
                <div class="card-body p-5">
                    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <span>Email ou mot de passe incorrect.</span>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2">
                        <i class="bi bi-check-circle-fill"></i>
                        <span>Déconnexion réussie.</span>
                    </div>
                    <form th:action="@{/auth/login}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Adresse Email</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                <input type="email" name="email" class="form-control border-start-0 ps-0"
                                       placeholder="votre@email.com" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" name="password" id="password"
                                       class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePwd()"><i class="bi bi-eye" id="eyeIcon"></i></button>
                            </div>
                        </div>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-login btn-warning text-white w-100 py-3 mt-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                        </button>
                    </form>
                    <div class="credentials-info mt-4 p-3 text-white-50 small">
                        <div class="fw-semibold text-warning mb-2"><i class="bi bi-info-circle me-1"></i>Comptes de démo</div>
                        <div>Admin: admin@cantine.com / admin123</div>
                        <div>Agent:agent@cantine.com / agent123</div>

                    </div>
                </div>
            </div>
            <p class="text-center text-white-50 mt-3 small">&copy; 2026 Cantine Scolaire-FST</p>
        </div>
    </div>
</div>
<script>
function togglePwd() {
    const p = document.getElementById('password');
    const i = document.getElementById('eyeIcon');
    if (p.type === 'password') { p.type = 'text'; i.className = 'bi bi-eye-slash'; }
    else { p.type = 'password'; i.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
