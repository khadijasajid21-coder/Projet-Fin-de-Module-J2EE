<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="sidebar" class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="sidebar" style="width:260px;top:56px">
    <div class="offcanvas-header border-bottom border-secondary">
        <div class="d-flex align-items-center gap-2">
            <div class="bg-warning rounded-circle d-flex align-items-center justify-content-center" style="width:40px;height:40px">
                <i class="bi bi-person-fill text-dark"></i>
            </div>
            <div>
                <div class="fw-bold" sec:authentication="name"></div>
                <small class="text-white-50" sec:authorize="hasRole('ADMIN')">Administrateur</small>
                <small class="text-white-50" sec:authorize="hasRole('AGENT') and !hasRole('ADMIN')">Agent Cantine</small>
            </div>
        </div>
    </div>
    <div class="offcanvas-body p-0">
        <ul class="nav flex-column py-2">
            <li class="nav-item">
                <a class="nav-link text-white-50 px-4 py-2 sidebar-link" href="/dashboard">
                    <i class="bi bi-speedometer2 me-2"></i>Tableau de bord
                </a>
            </li>
            <li class="nav-item mt-1">
                <a class="nav-link text-white-50 px-4 py-2 sidebar-link" href="/commandes">
                    <i class="bi bi-bag-check me-2"></i>Commandes
                </a>
            </li>
            <li class="nav-item mt-1">
                <a class="nav-link text-white-50 px-4 py-2 sidebar-link" href="/menus">
                    <i class="bi bi-calendar-week me-2"></i>Menus
                </a>
            </li>
            <li class="nav-item mt-1">
                <a class="nav-link text-white-50 px-4 py-2 sidebar-link" href="/plats">
                    <i class="bi bi-egg-fried me-2"></i>Plats
                </a>
            </li>
            <li sec:authorize="hasRole('ADMIN')" class="nav-item mt-1">
                <a class="nav-link text-white-50 px-4 py-2 sidebar-link" href="/users">
                    <i class="bi bi-people me-2"></i>Utilisateurs
                </a>
            </li>
            <li class="nav-item mt-3 px-3">
                <hr class="border-secondary">
                <small class="text-white-50 px-1">LIENS RAPIDES</small>
            </li>
            <li class="nav-item mt-1">
                <a class="nav-link text-white-50 px-4 py-2" href="/swagger-ui.html" target="_blank">
                    <i class="bi bi-code-slash me-2"></i>API Swagger
                </a>
            </li>
        </ul>
    </div>
</div>
<script>
(function() {
    var path = window.location.pathname;
    document.querySelectorAll('.sidebar-link').forEach(function(link) {
        var href = link.getAttribute('href');
        if (path === href || (href !== '/dashboard' && path.startsWith(href))) {
            link.classList.remove('text-white-50');
            link.classList.add('active', 'text-white', 'bg-primary', 'rounded', 'mx-2');
        }
    });
})();
</script>
</body>
</html>
