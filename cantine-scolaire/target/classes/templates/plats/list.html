<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Plats - Cantine Scolaire</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<style>
.plat-card { transition: transform .2s, box-shadow .2s; border-radius: 14px !important; overflow: hidden; }
.plat-card:hover { transform: translateY(-5px); box-shadow: 0 1rem 2rem rgba(0,0,0,.12) !important; }
.plat-img-card { width: 100%; height: 180px; object-fit: cover; }
.plat-img-placeholder { width:100%; height:180px; background: linear-gradient(135deg,#f8f9fa,#dee2e6); display:flex; align-items:center; justify-content:center; }
.prix-badge { font-size: 1.1rem; font-weight: 700; color: #198754; }
</style>
</head>
<body class="bg-light">
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div th:insert="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">
<div class="container-fluid py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold"><i class="bi bi-egg-fried text-primary me-2"></i>Gestion des Plats</h1>
        <a href="/plats/new" class="btn btn-primary px-4"><i class="bi bi-plus-lg me-1"></i>Nouveau Plat</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Recherche -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-9"><input type="text" name="q" th:value="${q}" class="form-control" placeholder="🔍  Rechercher un plat..."></div>
                <div class="col-md-2"><button class="btn btn-primary w-100">Chercher</button></div>
                <div class="col-md-1"><a href="/plats" class="btn btn-outline-secondary w-100"><i class="bi bi-x-lg"></i></a></div>
            </form>
        </div>
    </div>

    <!-- Cards -->
    <div class="row g-4" th:if="${not #lists.isEmpty(plats.content)}">
        <div class="col-xl-3 col-md-4 col-sm-6" th:each="plat : ${plats.content}">
            <div class="card border-0 shadow-sm plat-card h-100">

                <!-- Image -->
                <img th:if="${plat.image != null}"
                     th:src="${#strings.startsWith(plat.image,'http') ? plat.image : '/uploads/' + plat.image}"
                     class="plat-img-card" th:alt="${plat.nom}">
                <div th:unless="${plat.image != null}" class="plat-img-placeholder">
                    <i class="bi bi-egg-fried text-secondary" style="font-size:3rem"></i>
                </div>

                <!-- Badge dispo -->
                <div class="position-absolute top-0 end-0 m-2">
                    <span th:if="${plat.disponible}" class="badge bg-success shadow-sm">
                        <i class="bi bi-check-circle me-1"></i>Disponible
                    </span>
                    <span th:unless="${plat.disponible}" class="badge bg-danger shadow-sm">
                        <i class="bi bi-x-circle me-1"></i>Indisponible
                    </span>
                </div>

                <div class="card-body d-flex flex-column p-3">
                    <h6 class="fw-bold mb-1" th:text="${plat.nom}"></h6>
                    <p class="text-muted small mb-2 flex-grow-1"
                       th:text="${#strings.abbreviate(plat.description ?: 'Aucune description', 70)}"></p>
                    <div class="prix-badge mb-3" th:text="${#numbers.formatDecimal(plat.prix,1,'COMMA',2,'POINT')} + ' MAD'"></div>

                    <div class="d-flex gap-2">
                        <a th:href="@{/plats/{id}/edit(id=${plat.id})}" class="btn btn-sm btn-outline-primary flex-grow-1">
                            <i class="bi bi-pencil me-1"></i>Modifier
                        </a>
                        <form th:action="@{/plats/{id}/delete(id=${plat.id})}" method="post"
                              onsubmit="return confirm('Supprimer ce plat ?')">
                            <button class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Vide -->
    <div th:if="${#lists.isEmpty(plats.content)}" class="text-center py-5">
        <i class="bi bi-egg-fried display-4 text-muted"></i>
        <p class="text-muted mt-3">Aucun plat trouvé</p>
        <a href="/plats/new" class="btn btn-primary mt-2">Ajouter un plat</a>
    </div>

    <!-- Pagination -->
    <nav th:if="${plats.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${plats.first} ? 'disabled'">
                <a class="page-link" th:href="@{/plats(page=${plats.number - 1}, q=${q})}">‹</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, plats.totalPages - 1)}"
                th:classappend="${i == plats.number} ? 'active'">
                <a class="page-link" th:href="@{/plats(page=${i}, q=${q})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${plats.last} ? 'disabled'">
                <a class="page-link" th:href="@{/plats(page=${plats.number + 1}, q=${q})}">›</a>
            </li>
        </ul>
    </nav>

</div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
