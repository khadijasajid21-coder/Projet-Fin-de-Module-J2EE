<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Utilisateur - Cantine Scolaire</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet"></head>
<body class="bg-light">
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div th:insert="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 fw-bold"><i class="bi bi-person-plus text-primary me-2"></i><span th:text="${user.id != null} ? 'Modifier Utilisateur' : 'Nouvel Utilisateur'"></span></h1>
                <a href="/users" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Retour</a>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${user.id != null} ? @{/users/{id}/edit(id=${user.id})} : @{/users/new}"
                          th:object="${user}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nom *</label>
                                <input type="text" th:field="*{nom}" class="form-control" th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{nom}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Prénom *</label>
                                <input type="text" th:field="*{prenom}" class="form-control" th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{prenom}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email *</label>
                                <input type="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Téléphone</label>
                                <input type="text" th:field="*{telephone}" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Mot de passe <span th:if="${user.id != null}" class="text-muted small">(laisser vide = inchangé)</span></label>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Rôle *</label>
                                <select th:field="*{role}" class="form-select" id="roleSelect" onchange="toggleEtudiantFields()">
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r.name().replace('ROLE_','')}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <div class="form-check form-switch mt-4">
                                    <input type="checkbox" th:field="*{actif}" class="form-check-input" role="switch">
                                    <label class="form-check-label fw-semibold">Compte actif</label>
                                </div>
                            </div>
                            <!-- Etudiant fields -->
                            <div id="etudiantFields" class="col-12">
                                <hr><h6 class="fw-bold text-primary"><i class="bi bi-mortarboard me-1"></i>Informations Étudiant</h6>
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Matricule</label>
                                        <input type="text" th:field="*{matricule}" class="form-control" placeholder="ET2024001">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Filière</label>
                                        <input type="text" th:field="*{filiere}" class="form-control" placeholder="Informatique">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Niveau</label>
                                        <input type="text" th:field="*{niveau}" class="form-control" placeholder="L3">
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 d-flex gap-2 justify-content-end">
                                <a href="/users" class="btn btn-outline-secondary">Annuler</a>
                                <button type="submit" class="btn btn-primary px-4"><i class="bi bi-floppy me-1"></i>Enregistrer</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleEtudiantFields() {
    const role = document.getElementById('roleSelect').value;
    const fields = document.getElementById('etudiantFields');
    fields.style.display = role === 'ROLE_ETUDIANT' ? 'block' : 'none';
}
toggleEtudiantFields();
</script>
</body></html>
