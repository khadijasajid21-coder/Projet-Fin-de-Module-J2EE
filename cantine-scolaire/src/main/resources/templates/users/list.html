<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Utilisateurs - Cantine Scolaire</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet"></head>
<body class="bg-light">
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div th:insert="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold"><i class="bi bi-people text-primary me-2"></i>Gestion des Utilisateurs</h1>
        <a href="/users/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nouvel Utilisateur</a>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form method="get" class="row g-3 align-items-end">
                <div class="col-md-8"><input type="text" name="q" th:value="${q}" class="form-control" placeholder="Rechercher par nom, prénom ou email..."></div>
                <div class="col-md-2"><button class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>Chercher</button></div>
                <div class="col-md-2"><a href="/users" class="btn btn-outline-secondary w-100">Réinitialiser</a></div>
            </form>
        </div>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr><th>Utilisateur</th><th>Email</th><th>Téléphone</th><th>Rôle</th><th>Statut</th><th class="text-end">Actions</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users.content}">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" style="width:38px;height:38px" th:text="${u.prenom.charAt(0)} + ${u.nom.charAt(0)}"></div>
                                    <div>
                                        <div class="fw-semibold" th:text="${u.nomComplet}"></div>
                                        <small class="text-muted" th:if="${u.etudiant != null}" th:text="${u.etudiant.matricule}"></small>
                                    </div>
                                </div>
                            </td>
                            <td><small th:text="${u.email}"></small></td>
                            <td><small th:text="${u.telephone}"></small></td>
                            <td>
                                <span th:each="r : ${u.roles}" class="badge"
                                      th:classappend="${r.nom.name() == 'ROLE_ADMIN'} ? 'bg-danger' : (${r.nom.name() == 'ROLE_AGENT'} ? 'bg-info' : 'bg-primary')"
                                      th:text="${r.nom.name().replace('ROLE_','')}"></span>
                            </td>
                            <td>
                                <span th:if="${u.actif}" class="badge bg-success">Actif</span>
                                <span th:unless="${u.actif}" class="badge bg-secondary">Inactif</span>
                            </td>
                            <td class="text-end">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/users/{id}/edit(id=${u.id})}" class="btn btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                    <form th:action="@{/users/{id}/toggle(id=${u.id})}" method="post" class="d-inline">
                                        <button class="btn btn-outline-warning" title="Activer/Désactiver"><i class="bi bi-toggle-on"></i></button>
                                    </form>
                                    <form th:action="@{/users/{id}/delete(id=${u.id})}" method="post" class="d-inline" onsubmit="return confirm('Supprimer cet utilisateur ?')">
                                        <button class="btn btn-outline-danger"><i class="bi bi-trash"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${users.empty}">
                            <td colspan="6" class="text-center text-muted py-5"><i class="bi bi-person-x fs-2 d-block mb-2"></i>Aucun utilisateur trouvé</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center">
            <small class="text-muted">Page <span th:text="${users.number + 1}"></span> sur <span th:text="${users.totalPages}"></span> — <span th:text="${users.totalElements}"></span> utilisateurs</small>
            <nav th:if="${users.totalPages > 1}">
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${users.first} ? 'disabled'"><a class="page-link" th:href="@{/users(page=${users.number - 1},q=${q})}">«</a></li>
                    <li th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}" class="page-item" th:classappend="${i == users.number} ? 'active'"><a class="page-link" th:href="@{/users(page=${i},q=${q})}" th:text="${i + 1}"></a></li>
                    <li class="page-item" th:classappend="${users.last} ? 'disabled'"><a class="page-link" th:href="@{/users(page=${users.number + 1},q=${q})}">»</a></li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
