<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Détail Commande - Cantine Scolaire</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet"></head>
<body class="bg-light">
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div th:insert="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold"><i class="bi bi-receipt text-primary me-2"></i>Commande #<span th:text="${commande.id}"></span></h1>
        <a href="/commandes" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Retour</a>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="row g-4">
        <!-- Info commande -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white fw-bold"><i class="bi bi-info-circle me-2"></i>Informations</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-5 text-muted small">Commande #</dt><dd class="col-7 fw-bold" th:text="${commande.id}"></dd>
                        <dt class="col-5 text-muted small">Date</dt><dd class="col-7 small" th:text="${#temporals.format(commande.dateCommande,'dd/MM/yyyy HH:mm')}"></dd>
                        <dt class="col-5 text-muted small">Étudiant</dt><dd class="col-7 fw-semibold" th:text="${commande.etudiant.utilisateur.nomComplet}"></dd>
                        <dt class="col-5 text-muted small">Matricule</dt><dd class="col-7" th:text="${commande.etudiant.matricule}"></dd>
                        <dt class="col-5 text-muted small">Filière</dt><dd class="col-7" th:text="${commande.etudiant.filiere}"></dd>
                        <dt class="col-5 text-muted small">Statut</dt>
                        <dd class="col-7">
                            <span class="badge"
                                  th:classappend="${commande.statut.name() == 'EN_ATTENTE'} ? 'bg-warning text-dark' :
                                                 (${commande.statut.name() == 'VALIDEE'} ? 'bg-info' :
                                                 (${commande.statut.name() == 'PREPAREE'} ? 'bg-warning' :
                                                 (${commande.statut.name() == 'SERVIE'} ? 'bg-success' : 'bg-danger')))"
                                  th:text="${commande.statut}"></span>
                        </dd>
                        <dt class="col-5 text-muted small">Quantité</dt><dd class="col-7" th:text="${commande.quantiteTotale} + ' plat(s)'"></dd>
                        <dt class="col-5 text-muted small">Montant</dt><dd class="col-7 fw-bold text-success fs-5" th:text="${#numbers.formatDecimal(commande.montantTotal,1,'COMMA',2,'POINT')} + ' MAD'"></dd>
                    </dl>
                </div>
            </div>
            <!-- Changer statut -->
            <div class="card border-0 shadow-sm mt-4">
                <div class="card-header bg-warning text-dark fw-bold"><i class="bi bi-arrow-left-right me-2"></i>Changer le statut</div>
                <div class="card-body">
                    <form th:action="@{/commandes/{id}/statut(id=${commande.id})}" method="post">
                        <div class="mb-3">
                            <select name="statut" class="form-select">
                                <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}" th:selected="${s == commande.statut}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-semibold">
                            <i class="bi bi-check-circle me-1"></i>Mettre à jour
                        </button>
                    </form>
                    <!-- Transitions rapides -->
                    <div class="mt-3 d-grid gap-2">
                        <form th:if="${commande.statut.name() == 'EN_ATTENTE'}" th:action="@{/commandes/{id}/statut(id=${commande.id})}" method="post">
                            <input type="hidden" name="statut" value="VALIDEE">
                            <button class="btn btn-info text-white w-100"><i class="bi bi-check me-1"></i>Valider</button>
                        </form>
                        <form th:if="${commande.statut.name() == 'VALIDEE'}" th:action="@{/commandes/{id}/statut(id=${commande.id})}" method="post">
                            <input type="hidden" name="statut" value="PREPAREE">
                            <button class="btn btn-warning w-100"><i class="bi bi-fire me-1"></i>Marquer En Préparation</button>
                        </form>
                        <form th:if="${commande.statut.name() == 'PREPAREE'}" th:action="@{/commandes/{id}/statut(id=${commande.id})}" method="post">
                            <input type="hidden" name="statut" value="SERVIE">
                            <button class="btn btn-success w-100"><i class="bi bi-check-all me-1"></i>Marquer Servie</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- Lignes commande -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white fw-bold"><i class="bi bi-list-ul me-2"></i>Détail des plats commandés</div>
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light"><tr><th>Plat</th><th class="text-center">Quantité</th><th class="text-end">Prix unitaire</th><th class="text-end">Sous-total</th></tr></thead>
                        <tbody>
                            <tr th:each="ligne : ${commande.lignesCommande}">
                                <td>
                                    <div class="fw-semibold" th:text="${ligne.plat.nom}"></div>
                                    <small class="text-muted" th:text="${ligne.plat.description}"></small>
                                </td>
                                <td class="text-center"><span class="badge bg-primary" th:text="${ligne.quantite}"></span></td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(ligne.prixUnitaire,1,'COMMA',2,'POINT')} + ' MAD'"></td>
                                <td class="text-end fw-bold text-success" th:text="${#numbers.formatDecimal(ligne.sousTotal,1,'COMMA',2,'POINT')} + ' MAD'"></td>
                            </tr>
                        </tbody>
                        <tfoot class="table-dark">
                            <tr>
                                <td colspan="2" class="fw-bold">TOTAL</td>
                                <td class="text-end fw-bold" th:text="${commande.quantiteTotale} + ' plat(s)'"></td>
                                <td class="text-end fw-bold fs-5" th:text="${#numbers.formatDecimal(commande.montantTotal,1,'COMMA',2,'POINT')} + ' MAD'"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
